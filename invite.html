<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>25th Anniversary Celebration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
text-align:center;
background:#f7f2f4;
}

/* MAIN CARD */

.main-card{

max-width:500px;

margin:auto;

padding:30px 20px;

background:white;

border-radius:20px;

box-shadow:0 0 20px rgba(0,0,0,0.15);

margin-top:30px;

}

/* HEADINGS */

h1{
font-size:30px;
margin-bottom:10px;
}

h3{
color:#444;
}

/* IMAGE */

.photo{

width:220px;

border-radius:20px;

margin:20px 0;

}

/* COUPLE NAME */

.couple{

font-size:22px;

font-weight:500;

}

/* DATE */

.date{

margin-top:10px;

font-size:16px;

color:#555;

}

/* COUNTDOWN */

#countdown{

margin:20px 0;

font-size:22px;

color:#d81b60;

font-weight:bold;

}

/* VENUE */

.venue{

margin-top:20px;

}

/* BUTTON */

button{

margin-top:10px;

padding:10px 20px;

border:none;

border-radius:30px;

background:linear-gradient(45deg,#ff4081,#ff80ab);

color:white;

font-size:14px;

cursor:pointer;

}

/* FOOTER */

.footer{

margin-top:25px;

font-size:14px;

color:#444;

}

/* PETALS */

.petal{

position:fixed;

top:-20px;

background:pink;

border-radius:50% 50% 50% 0;

opacity:0.7;

pointer-events:none;

animation: fall linear infinite;

}

@keyframes fall{

0%{
transform:translateY(-10px) rotate(0deg);
}

100%{
transform:translateY(110vh) rotate(360deg);
}

}

/* MOBILE */

@media(max-width:500px){

.main-card{
margin:15px;
padding:20px;
}

.photo{
width:180px;
}

h1{
font-size:24px;
}

}

</style>

</head>

<body>

<div class="main-card">

<h3>Celebrating</h3>

<h1>25th Wedding Anniversary</h1>

<img src="images/couple.jpg" class="photo">

<p class="couple">
Pukesh Kumar ❤️ Ranjeeta Kumari
</p>

<p class="date">
25 April 2026 | 7 PM
</p>

<div id="countdown"></div>

<div class="venue">

<h4>Venue</h4>

<p>
Milan Mandap Marriage Hall <br>
Chhoti Pahari, Bihar Sharif
</p>

<a href="https://www.google.com/maps/search/?api=1&query=Milan+Mandap+Marriage+Hall+Chhoti+Pahari+Biharsharif" target="_blank">

<button>
View Location
</button>

</a>

</div>

<p class="footer">
Your presence will make our celebration more joyful ❤️
</p>

</div>

<script>

/* COUNTDOWN */

var eventDate = new Date("April 25, 2026 19:00:00").getTime();

setInterval(function(){

var now = new Date().getTime();

var gap = eventDate - now;

var d = Math.floor(gap/(1000*60*60*24));

var h = Math.floor((gap%(1000*60*60*24))/(1000*60*60));

var m = Math.floor((gap%(1000*60*60))/(1000*60));

document.getElementById("countdown").innerHTML =
d + " Days " + h + " Hours " + m + " Minutes Left ❤️";

},1000);

/* PETALS */

const petalCount = 25;

for(let i=0;i<petalCount;i++){

let petal = document.createElement("div");

petal.classList.add("petal");

document.body.appendChild(petal);

let size = Math.random()*12+8;

petal.style.width=size+"px";

petal.style.height=size+"px";

petal.style.left=Math.random()*window.innerWidth+"px";

petal.style.animationDuration=(Math.random()*5+5)+"s";

petal.style.animationDelay=Math.random()*5+"s";

}

</script>

</body>
</html>
